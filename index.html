<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forge World Plus — File Showcase</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,900&family=Archivo:wght@400;500;600;700&family=Archivo+Expanded:wght@600;700&display=swap');

  :root{
    --bg:#1c1714;
    --bg-2:#241d19;
    --panel:#2c2420;
    --panel-2:#352b25;
    --line:#43362e;
    --cyan:#37c4d9;
    --amber:#e8923a;
    --text:#ece2d6;
    --muted:#9c8d7e;
    --muted-2:#6f6358;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;background:var(--bg);color:var(--text);
    font-family:'Archivo',sans-serif;-webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(circle at 88% -5%, rgba(55,196,217,.07), transparent 42%),
      radial-gradient(circle at 5% 105%, rgba(232,146,58,.06), transparent 45%);
  }
  a{color:inherit}
  ::selection{background:var(--amber);color:var(--bg)}

  /* Masthead */
  header.mast{
    padding:clamp(2.4rem,5vw,4.2rem) clamp(1.2rem,4vw,3.5rem) 1.8rem;
    border-bottom:1px solid var(--line);position:relative;
  }
  .eyebrow{
    font-family:'Archivo',sans-serif;font-weight:600;
    font-size:.72rem;letter-spacing:.34em;text-transform:uppercase;
    color:var(--cyan);display:flex;gap:.85rem;align-items:center;flex-wrap:wrap;
  }
  .eyebrow .pip{width:7px;height:7px;border-radius:50%;background:var(--amber);box-shadow:0 0 12px var(--amber)}
  .eyebrow .sep{color:var(--muted-2)}
  h1{
    font-family:'Fraunces',serif;font-weight:900;
    font-size:clamp(2.9rem,9vw,7rem);line-height:.9;letter-spacing:-.02em;
    margin:.55rem 0 .35rem;
  }
  h1 em{font-style:italic;font-weight:500;color:var(--amber)}
  .lede{max-width:48ch;color:var(--muted);font-size:1.04rem;line-height:1.5;margin:.6rem 0 0}
  .stats{margin-top:1.8rem;display:flex;gap:2.6rem;flex-wrap:wrap}
  .stats div{font-family:'Archivo',sans-serif;font-size:.74rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2)}
  .stats b{display:block;font-family:'Fraunces',serif;font-size:1.7rem;font-weight:600;color:var(--text);letter-spacing:-.01em;margin-bottom:.1rem}
  .stats b.cy{color:var(--cyan)} .stats b.am{color:var(--amber)}

  /* Controls bar */
  .controls{
    position:sticky;top:0;z-index:30;
    background:color-mix(in srgb,var(--bg) 90%,transparent);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
    padding:.7rem clamp(1.2rem,4vw,3.5rem);
    display:flex;gap:1rem;align-items:center;flex-wrap:wrap;
  }
  .search{
    flex:1;min-width:200px;position:relative;display:flex;align-items:center;
  }
  .search svg{position:absolute;left:.7rem;width:16px;height:16px;stroke:var(--muted);pointer-events:none}
  .search input{
    width:100%;background:var(--panel);border:1px solid var(--line);
    color:var(--text);font-family:'Archivo',sans-serif;font-size:.92rem;
    padding:.6rem .8rem .6rem 2.2rem;border-radius:3px;outline:none;transition:border-color .15s;
  }
  .search input::placeholder{color:var(--muted-2)}
  .search input:focus{border-color:var(--cyan)}
  .chips{display:flex;gap:.35rem;flex-wrap:wrap}
  .chip{
    font-family:'Archivo',sans-serif;font-size:.78rem;font-weight:500;
    padding:.42rem .8rem;border:1px solid var(--line);background:transparent;
    color:var(--muted);border-radius:100px;cursor:pointer;transition:all .15s;letter-spacing:.02em;
  }
  .chip:hover{color:var(--text);border-color:var(--muted)}
  .chip.active{background:var(--cyan);border-color:var(--cyan);color:var(--bg);font-weight:600}

  main{padding:0 clamp(1.2rem,4vw,3.5rem) 5rem}

  .band{padding-top:2.8rem;scroll-margin-top:4rem}
  .band-head{display:flex;align-items:baseline;gap:1rem;border-bottom:1px solid var(--line);padding-bottom:.5rem;margin-bottom:1.5rem}
  .band-head h2{font-family:'Fraunces',serif;font-weight:900;font-size:clamp(1.9rem,5.5vw,3.2rem);margin:0;letter-spacing:-.02em;line-height:1}
  .band-head .yr-cnt{margin-left:auto;font-family:'Archivo',sans-serif;font-size:.76rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2)}

  .grid{display:grid;gap:1.7rem;grid-template-columns:repeat(auto-fill,minmax(284px,1fr))}
  .card{
    position:relative;display:flex;flex-direction:column;background:var(--panel);
    border:1px solid var(--line);border-radius:5px;overflow:hidden;text-decoration:none;
    transition:transform .22s cubic-bezier(.2,.7,.2,1),box-shadow .22s,border-color .22s;
  }
  
  .imgwrap{height:300px;overflow:hidden;background:var(--bg-2);position:relative;cursor:zoom-in;display:flex;align-items:center;justify-content:center}
  .imgwrap img{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;display:block;transition:transform .5s cubic-bezier(.2,.7,.2,1)}
  .card .body{padding:1rem 1.1rem 1.15rem;display:flex;flex-direction:column;gap:.4rem;flex:1}
  .when{font-family:'Archivo',sans-serif;font-size:.72rem;letter-spacing:.13em;text-transform:uppercase;color:var(--amber);font-weight:600}
  .title{font-family:'Fraunces',serif;font-weight:600;font-size:1.24rem;line-height:1.15;letter-spacing:-.01em}
  .go{margin-top:auto;font-family:'Archivo',sans-serif;font-size:.72rem;font-weight:600;letter-spacing:.04em;color:var(--cyan);display:flex;align-items:center;gap:.4rem;opacity:0;transform:translateX(-4px);transition:all .22s}
  a.card:hover{transform:translateY(-4px);box-shadow:0 16px 34px -16px rgba(0,0,0,.6);border-color:var(--cyan)}
  a.card:hover .imgwrap img{transform:scale(1.04)}
  a.card:hover .go{opacity:1;transform:translateX(0)}
  a.card:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}

  /* status tag */
  .tag{position:absolute;top:.6rem;left:.6rem;z-index:3;font-family:'Archivo',sans-serif;font-size:.6rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:.28rem .55rem;border-radius:100px}
  .tag.ready{background:rgba(55,196,217,.16);color:var(--cyan);border:1px solid rgba(55,196,217,.4)}
  .tag.pending{background:rgba(156,141,126,.14);color:var(--muted);border:1px solid var(--muted-2)}
  .card.missing{cursor:default}
  .card.missing .imgwrap img{filter:grayscale(.45) brightness(.82)}
  .card.missing .go{display:none}

  .empty{padding:4rem 1rem;text-align:center;color:var(--muted);font-size:1.05rem;display:none}
  .empty.show{display:block}

  footer{border-top:1px solid var(--line);margin:0 clamp(1.2rem,4vw,3.5rem);padding:2rem 0 3rem;font-family:'Archivo',sans-serif;font-size:.76rem;color:var(--muted-2);display:flex;justify-content:space-between;flex-wrap:wrap;gap:1rem;letter-spacing:.04em}

  /* Lightbox */
  .lb{position:fixed;inset:0;z-index:100;background:rgba(12,9,7,.92);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:2rem;cursor:zoom-out}
  .lb.open{display:flex}
  .lb-inner{max-width:min(880px,92vw);max-height:90vh;display:flex;flex-direction:column;gap:.9rem;align-items:center}
  .lb img{max-width:100%;max-height:74vh;object-fit:contain;border-radius:4px;box-shadow:0 24px 60px -20px rgba(0,0,0,.8)}
  .lb-meta{text-align:center}
  .lb-meta .lb-when{font-family:'Archivo',sans-serif;font-size:.72rem;letter-spacing:.13em;text-transform:uppercase;color:var(--amber);font-weight:600;margin-bottom:.25rem}
  .lb-meta .lb-title{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:600}
  .lb-meta a{display:inline-block;margin-top:.7rem;font-family:'Archivo',sans-serif;font-size:.82rem;font-weight:600;color:var(--bg);background:var(--cyan);padding:.5rem 1.1rem;border-radius:3px;text-decoration:none;letter-spacing:.03em}
  .lb-meta a:hover{background:var(--amber)}
  .lb-meta span.none{color:var(--muted);font-size:.84rem;font-family:'Archivo',sans-serif}
  .lb-close{position:absolute;top:1.2rem;right:1.4rem;font-size:1.8rem;color:var(--muted);background:none;border:none;cursor:pointer;line-height:1}
  .lb-close:hover{color:var(--text)}

  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}html{scroll-behavior:auto}}
</style>
</head>
<body>
<header class="mast">
  <div class="eyebrow"><span class="pip"></span>Forge World Plus<span class="sep">/</span>Monthly File Showcase<span class="sep">/</span>2021&ndash;2026</div>
  <h1>The <em>Catalogue</em></h1>
  <p class="lede">Every monthly design drop, from the first banner set to the latest coffee stands. Tap any tile to open its file location.</p>
  <div class="stats">
    <div><b id="s-total">0</b>Designs</div>
    <div><b class="cy" id="s-linked">0</b>Files ready</div>
    <div><b class="am" id="s-years">0</b>Years</div>
  </div>
</header>

<div class="controls">
  <label class="search">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4.3-4.3"></path></svg>
    <input id="q" type="search" placeholder="Search designs&hellip;" aria-label="Search designs">
  </label>
  <div class="chips" id="chips"></div>
</div>

<main id="main"></main>
<div class="empty" id="empty">No designs match that search.</div>

<footer>
  <span>Forge World Plus &mdash; file showcase</span>
  <span id="foot"></span>
</footer>

<div class="lb" id="lb" role="dialog" aria-modal="true">
  <button class="lb-close" id="lbClose" aria-label="Close">&times;</button>
  <div class="lb-inner">
    <img id="lbImg" alt="">
    <div class="lb-meta">
      <div class="lb-when" id="lbWhen"></div>
      <div class="lb-title" id="lbTitle"></div>
      <div id="lbLink"></div>
    </div>
  </div>
</div>

const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const years=[...new Set(DATA.map(r=>r.year))].sort();
const linked=DATA.filter(r=>!r.missing).length;

document.getElementById('s-total').textContent=DATA.length; document.getElementById('s-linked').textContent=linked; document.getElementById('s-years').textContent=years.length;
document.getElementById('foot').textContent=DATA.length+" designs \u00b7 "+linked+" with files \u00b7 "+(DATA.length-linked)+" pending";

// chips
let filterYear="all";
const chipsEl=document.getElementById('chips');
function mkChip(label,val){
  const b=document.createElement('button');b.className='chip'+(val==='all'?' active':'');b.textContent=label;b.dataset.val=val;
  b.onclick=()=>{filterYear=val;[...chipsEl.children].forEach(c=>c.classList.toggle('active',c.dataset.val===val));render();};
  chipsEl.appendChild(b);
}
mkChip('All years','all'); years.forEach(y=>mkChip(y,y));

const main=document.getElementById('main');
const qEl=document.getElementById('q');
const emptyEl=document.getElementById('empty');
let query="";
qEl.addEventListener('input',()=>{query=qEl.value.trim().toLowerCase();render();});

function render(){
  main.innerHTML="";
  let shown=0;
  years.forEach(y=>{
    if(filterYear!=='all'&&filterYear!==y) return;
    let items=DATA.filter(r=>r.year===y).sort((a,b)=>MONTHS.indexOf(a.month)-MONTHS.indexOf(b.month));
    if(query) items=items.filter(r=>(r.name+' '+r.month+' '+r.year).toLowerCase().includes(query));
    if(!items.length) return;
    shown+=items.length;
    const band=document.createElement('section');band.className='band';band.id='y'+y;
    band.innerHTML='<div class="band-head"><h2>'+y+'</h2><span class="yr-cnt">'+items.length+' drops</span></div>';
    const grid=document.createElement('div');grid.className='grid';
    items.forEach((r,i)=>{
      const ready=!r.missing&&r.url;
      const tag=ready?'a':'div';
      const el=document.createElement(tag);
      el.className='card'+(ready?'':' missing');
      if(ready){el.href=r.url;el.target='_blank';el.rel='noopener';}
      el.innerHTML=
        '<span class="tag '+(ready?'ready':'pending')+'">'+(ready?'Files ready':'Pending')+'</span>'+
        '<div class="imgwrap" data-idx="'+DATA.indexOf(r)+'"><img loading="lazy" src="'+r.img+'" alt="'+r.name.replace(/"/g,'&quot;')+'"></div>'+
        '<div class="body"><div class="when">'+r.month+' '+r.year+'</div><div class="title">'+r.name+'</div>'+
        (ready?'<div class="go">Open files &rarr;</div>':'')+'</div>';
      grid.appendChild(el);
    });
    band.appendChild(grid);main.appendChild(band);
  });
  emptyEl.classList.toggle('show',shown===0);
}
render();

// lightbox (click image; don't trigger card link)
const lb=document.getElementById('lb'),lbImg=document.getElementById('lbImg'),lbWhen=document.getElementById('lbWhen'),lbTitle=document.getElementById('lbTitle'),lbLink=document.getElementById('lbLink');
main.addEventListener('click',e=>{
  const w=e.target.closest('.imgwrap'); if(!w) return;
  e.preventDefault(); e.stopPropagation();
  const r=DATA[+w.dataset.idx];
  lbImg.src=r.img; lbImg.alt=r.name; lbWhen.textContent=r.month+' '+r.year; lbTitle.textContent=r.name;
  lbLink.innerHTML=(!r.missing&&r.url)?'<a href="'+r.url+'" target="_blank" rel="noopener">Open files &rarr;</a>':'<span class="none">No file link yet</span>';
  lb.classList.add('open');
});
function closeLb(){lb.classList.remove('open');lbImg.src="";}
lb.addEventListener('click',e=>{if(e.target===lb||e.target.id==='lbClose'||e.target.closest('.lb-close'))closeLb();});
document.getElementById('lbClose').onclick=closeLb;
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLb();});
</script>
